{% extends 'desk/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold mb-6">Update Profile</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-black text-white font-bold py-2 rounded-lg">Save Changes</button>
        </form>
        <div class="mt-4 text-center">
            <a href="/profile/" class="text-gray-500 hover:text-yellow-600">← Back to Profile</a>
        </div>
    </div>
</div>
{% endblock %}
