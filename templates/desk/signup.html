{% extends 'desk/base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-center mb-6">Create Account</h1>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-black text-white font-bold py-2 rounded-lg">Sign Up</button>
        </form>
        <p class="text-center mt-4 text-sm">Already have an account? <a href="/login/" class="text-yellow-600">Login</a></p>
    </div>
</div>
{% endblock %}
