{% extends 'desk/base.html' %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-6">
            <div class="flex justify-center space-x-2 mb-3">
                <div class="w-10 h-10 bg-black rounded-full"></div>
                <div class="w-10 h-10 bg-yellow-500 rounded-full"></div>
                <div class="w-10 h-10 bg-red-600 rounded-full"></div>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Citizen Login</h1>
            <p class="text-gray-600 text-sm mt-1">Login to submit reports and engage with government</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Username or Email</label>
                <input type="text" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
            </div>
            <button type="submit" class="w-full bg-black hover:bg-gray-800 text-white font-bold py-2 rounded-lg transition">
                🔑 Login
            </button>
        </form>
        
        <p class="text-center mt-4 text-sm">
            Don't have an account? <a href="/signup/" class="text-yellow-600 hover:underline">Sign Up</a>
        </p>
        
        <hr class="my-4">
        
        <p class="text-center text-sm">
            <a href="/ministry/login/" class="text-blue-600 hover:underline">🏛️ Login as Ministry →</a>
        </p>
    </div>
</div>
{% endblock %}
